<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alan Paul | Pianist, Composer, Performer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              marble: {
                light: '#fdfdfd', // Very light gray/white
                dark: '#0a0a0a',  // Deep black
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Marble-like background effect */
      .bg-marble-light {
        background-color: #ffffff;
        background-image: url('/assets/background.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-blend-mode: luminosity;
      }
      
      .dark .bg-marble-dark {
        background-color: #000000;
        background-image: url('/assets/background.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-blend-mode: overlay;
      }

      /* Ensure text readability over background */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0.5; /* Adjust opacity of the texture */
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    "@stripe/stripe-js": "https://esm.sh/@stripe/stripe-js@3.0.7",
    "@stripe/react-stripe-js": "https://esm.sh/@stripe/react-stripe-js@2.6.0?deps=react@18.2.0,react-dom@18.2.0,@stripe/stripe-js@3.0.7",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
